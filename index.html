<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>JANGAN KENA!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --grid: #0f1020;
    --player: #00e5ff;
    --enemy: #ff3366;
    --accent: #ffe600;
    --green: #00ff99;
    --text: #ffffff;
    --dim: #444466;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  html, body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    width: 100%;
    font-family: 'Press Start 2P', monospace;
    color: var(--text);
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.12) 2px,
      rgba(0,0,0,0.12) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 420px;
    padding: 8px;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    font-size: clamp(7px, 2vw, 10px);
    color: var(--dim);
    padding: 0 4px;
  }

  #hud span { color: var(--accent); }

  .canvas-wrapper {
    position: relative;
    width: 100%;
  }

  canvas {
    border: 2px solid #1a1a3a;
    box-shadow:
      0 0 30px rgba(0, 229, 255, 0.15),
      0 0 60px rgba(0, 229, 255, 0.05),
      inset 0 0 30px rgba(0,0,0,0.5);
    display: block;
    image-rendering: pixelated;
    width: 100%;
    height: auto;
  }

  #info {
    font-size: clamp(5px, 1.5vw, 7px);
    color: var(--dim);
    letter-spacing: 1px;
    text-align: center;
  }

  /* OVERLAY screens */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 10, 15, 0.92);
    z-index: 10;
    gap: 16px;
    border-radius: 2px;
  }

  #overlay h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px, 6vw, 32px);
    font-weight: 900;
    color: var(--accent);
    text-shadow:
      0 0 20px rgba(255,230,0,0.8),
      0 0 40px rgba(255,230,0,0.4);
    letter-spacing: 2px;
    text-align: center;
    white-space: nowrap;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  #overlay p {
    font-size: clamp(6px, 1.8vw, 8px);
    color: var(--dim);
    line-height: 2;
    text-align: center;
  }

  #overlay .btn {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(8px, 2.5vw, 10px);
    background: transparent;
    border: 2px solid var(--green);
    color: var(--green);
    padding: 12px 24px;
    cursor: pointer;
    letter-spacing: 2px;
    transition: all 0.2s;
    text-shadow: 0 0 10px var(--green);
    box-shadow: 0 0 15px rgba(0,255,153,0.2);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #overlay .btn:hover, #overlay .btn:active {
    background: var(--green);
    color: var(--bg);
    box-shadow: 0 0 25px rgba(0,255,153,0.5);
  }

  #overlay .score-display {
    font-size: clamp(10px, 3vw, 14px);
    color: var(--accent);
    text-shadow: 0 0 15px rgba(255,230,0,0.5);
  }

  #overlay .gameover-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(24px, 7vw, 36px);
    font-weight: 900;
    color: var(--enemy);
    text-shadow: 0 0 20px rgba(255,51,102,0.8);
  }

  /* ── MOBILE TOUCH CONTROLS ── */
  #touch-controls {
    display: none;
    width: 100%;
    justify-content: space-between;
    padding: 4px 0;
    gap: 12px;
  }

  .touch-btn {
    flex: 1;
    height: 64px;
    background: rgba(0, 229, 255, 0.06);
    border: 2px solid rgba(0, 229, 255, 0.25);
    border-radius: 6px;
    color: var(--player);
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    user-select: none;
    transition: background 0.1s, border-color 0.1s;
  }

  .touch-btn:active, .touch-btn.pressed {
    background: rgba(0, 229, 255, 0.2);
    border-color: var(--player);
    box-shadow: 0 0 15px rgba(0,229,255,0.3);
  }

  #pause-btn {
    width: 100%;
    height: 40px;
    background: rgba(255, 230, 0, 0.05);
    border: 2px solid rgba(255, 230, 0, 0.2);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(6px, 2vw, 8px);
    cursor: pointer;
    letter-spacing: 2px;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #pause-btn:active {
    background: rgba(255, 230, 0, 0.15);
  }

  /* Show touch controls on touch devices */
  @media (hover: none) and (pointer: coarse) {
    #touch-controls { display: flex; }
    #pause-row { display: flex; }
    #info { display: none; }
  }

  #pause-row {
    display: none;
    width: 100%;
  }
</style>
</head>
<body>

<div id="wrapper">
  <div id="hud">
    <div>SKOR: <span id="scoreDisplay">0</span></div>
    <div>LEVEL: <span id="levelDisplay">1</span></div>
    <div>HIDUP: <span id="livesDisplay">❤️❤️❤️</span></div>
  </div>

  <div class="canvas-wrapper">
    <canvas id="gameCanvas" width="400" height="560"></canvas>

    <!-- MENU -->
    <div id="overlay">
      <h1>JANGAN KENA!</h1>
      <p>
        HINDARIN SEMUA RINTANGAN<br>
        JANGAN SAMPE KETABRAK!
      </p>
      <p style="color:#2a2a4a; font-size:7px">
        ← → / A D = GERAK (Keyboard)<br>
        TOMBOL KIRI / KANAN (HP)<br>
        SPASI = PAUSE
      </p>
      <button class="btn" onclick="startGame()">▶ MULAI GAME</button>
    </div>
  </div>

  <!-- Mobile touch controls -->
  <div id="touch-controls">
    <div class="touch-btn" id="btn-left">◀</div>
    <div class="touch-btn" id="btn-right">▶</div>
  </div>

  <div id="pause-row">
    <button id="pause-btn" onclick="togglePause()">⏸ PAUSE</button>
  </div>

  <div id="info">← → GERAK &nbsp;|&nbsp; SPASI PAUSE</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreDisplay');
const levelEl = document.getElementById('levelDisplay');
const livesEl = document.getElementById('livesDisplay');

const W = canvas.width;
const H = canvas.height;

// ── STATE ──
let gameState = 'menu';
let score = 0;
let lives = 3;
let level = 1;
let frame = 0;
let spawnTimer = 0;
let spawnDelay = 80;
let enemySpeed = 3;
let animId;

const GRID = 40;

// ── PLAYER ──
const player = {
  x: W / 2 - 20,
  y: H - 80,
  w: 40,
  h: 40,
  speed: 6,
  trail: [],
};

let enemies = [];
let particles = [];

// ── KEYBOARD ──
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    togglePause();
  }
  if (['ArrowLeft','ArrowRight','a','A','d','D'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// ── TOUCH / MOBILE CONTROLS ──
const touchState = { left: false, right: false };

function setupTouchBtn(id, dir) {
  const btn = document.getElementById(id);
  if (!btn) return;

  const press = (e) => {
    e.preventDefault();
    touchState[dir] = true;
    btn.classList.add('pressed');
  };
  const release = (e) => {
    e.preventDefault();
    touchState[dir] = false;
    btn.classList.remove('pressed');
  };

  btn.addEventListener('touchstart', press, { passive: false });
  btn.addEventListener('touchend', release, { passive: false });
  btn.addEventListener('touchcancel', release, { passive: false });
  // Also support mouse for desktop testing
  btn.addEventListener('mousedown', press);
  btn.addEventListener('mouseup', release);
  btn.addEventListener('mouseleave', release);
}

setupTouchBtn('btn-left', 'left');
setupTouchBtn('btn-right', 'right');

// ── SWIPE / DRAG on canvas ──
let touchStartX = null;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
}, { passive: false });

function togglePause() {
  if (gameState === 'playing') pauseGame();
  else if (gameState === 'paused') resumeGame();
}

// ── HELPERS ──
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function spawnEnemy() {
  const w = randInt(25, 55);
  const h = randInt(18, 35);
  const colors = ['#ff3366', '#ff6600', '#cc00ff', '#ff0066'];
  enemies.push({
    x: randInt(0, W - w),
    y: -h - 5,
    w, h,
    speed: enemySpeed + Math.random() * 1.5,
    color: colors[randInt(0, colors.length - 1)],
    rot: (Math.random() - 0.5) * 0.1,
    angle: 0,
  });
}

function spawnParticles(x, y, color) {
  for (let i = 0; i < 12; i++) {
    const angle = (Math.PI * 2 / 12) * i;
    particles.push({
      x, y,
      vx: Math.cos(angle) * (2 + Math.random() * 3),
      vy: Math.sin(angle) * (2 + Math.random() * 3),
      life: 1,
      color,
      size: randInt(2, 5),
    });
  }
}

function rectCollide(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function updateHUD() {
  scoreEl.textContent = score;
  levelEl.textContent = level;
  livesEl.textContent = '❤️'.repeat(lives);
}

// ── DRAW ──
function drawGrid() {
  ctx.strokeStyle = '#0f1020';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += GRID) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += GRID) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function drawPlayer() {
  player.trail.forEach((t, i) => {
    const alpha = (i / player.trail.length) * 0.3;
    ctx.fillStyle = `rgba(0, 229, 255, ${alpha})`;
    ctx.fillRect(t.x + 5, t.y + 5, player.w - 10, player.h - 10);
  });

  const { x, y, w, h } = player;

  ctx.shadowColor = '#00e5ff';
  ctx.shadowBlur = 15;

  ctx.fillStyle = '#001a2a';
  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, 6);
  ctx.fill();
  ctx.stroke();

  ctx.fillStyle = '#00e5ff';
  ctx.fillRect(x + 8, y + 10, 8, 8);
  ctx.fillRect(x + 24, y + 10, 8, 8);

  ctx.fillStyle = '#001a2a';
  ctx.fillRect(x + 11, y + 13, 4, 4);
  ctx.fillRect(x + 27, y + 13, 4, 4);

  ctx.strokeStyle = '#00e5ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + w/2, y + h - 10, 8, 0, Math.PI);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function drawEnemies() {
  enemies.forEach(e => {
    ctx.save();
    ctx.translate(e.x + e.w/2, e.y + e.h/2);
    ctx.rotate(e.angle);

    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = e.color;
    ctx.strokeStyle = '#ffffff33';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(-e.w/2, -e.h/2, e.w, e.h, 4);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = 'white';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('!', 0, 0);

    ctx.shadowBlur = 0;
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1;
}

// ── GAME LOOP ──
function gameLoop() {
  frame++;
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);
  drawGrid();

  if (gameState !== 'playing') {
    drawPlayer();
    drawEnemies();
    animId = requestAnimationFrame(gameLoop);
    return;
  }

  // Movement: keyboard OR touch buttons
  const goLeft  = keys['ArrowLeft']  || keys['a'] || keys['A'] || touchState.left;
  const goRight = keys['ArrowRight'] || keys['d'] || keys['D'] || touchState.right;

  if (goLeft  && player.x > 0)             player.x -= player.speed;
  if (goRight && player.x + player.w < W)  player.x += player.speed;

  // Trail
  player.trail.push({ x: player.x, y: player.y });
  if (player.trail.length > 8) player.trail.shift();

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnDelay) {
    spawnEnemy();
    spawnTimer = 0;
  }

  // Update enemies
  enemies.forEach(e => {
    e.y += e.speed;
    e.angle += e.rot;
  });

  // Remove off-screen & add score
  enemies = enemies.filter(e => {
    if (e.y > H + 10) { score++; updateHUD(); return false; }
    return true;
  });

  // Collision
  for (let i = enemies.length - 1; i >= 0; i--) {
    if (rectCollide(player, enemies[i])) {
      spawnParticles(player.x + player.w/2, player.y + player.h/2, '#ff3366');
      enemies.splice(i, 1);
      lives--;
      updateHUD();
      ctx.fillStyle = 'rgba(255,51,102,0.3)';
      ctx.fillRect(0, 0, W, H);
      if (lives <= 0) { gameOver(); return; }
    }
  }

  // Level up
  const newLevel = 1 + Math.floor(score / 10);
  if (newLevel !== level) {
    level = newLevel;
    enemySpeed = 3 + level * 0.5;
    spawnDelay = Math.max(80 - level * 8, 25);
    updateHUD();
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.9; p.vy *= 0.9;
    p.life -= 0.05;
  });
  particles = particles.filter(p => p.life > 0);

  drawParticles();
  drawPlayer();
  drawEnemies();

  ctx.font = '10px "Press Start 2P"';
  ctx.fillStyle = 'rgba(255,230,0,0.2)';
  ctx.textAlign = 'center';
  ctx.fillText(`LEVEL ${level}`, W/2, 20);

  animId = requestAnimationFrame(gameLoop);
}

// ── GAME STATES ──
function startGame() {
  score = 0; lives = 3; level = 1;
  frame = 0; spawnTimer = 0;
  spawnDelay = 80; enemySpeed = 3;
  enemies = []; particles = [];
  player.x = W/2 - 20; player.trail = [];
  touchState.left = false; touchState.right = false;
  gameState = 'playing';
  overlay.style.display = 'none';
  updateHUD();
  if (animId) cancelAnimationFrame(animId);
  gameLoop();
}

function pauseGame() {
  gameState = 'paused';
  overlay.innerHTML = `
    <h1 style="font-size:clamp(18px,5vw,32px)">PAUSE</h1>
    <p style="font-size:8px; color:#444466">SPASI / TOMBOL LANJUT</p>
    <button class="btn" onclick="resumeGame()">▶ LANJUT</button>
  `;
  overlay.style.display = 'flex';
}

function resumeGame() {
  gameState = 'playing';
  overlay.style.display = 'none';
}

function gameOver() {
  gameState = 'gameover';
  cancelAnimationFrame(animId);
  overlay.innerHTML = `
    <div class="gameover-title">GAME OVER</div>
    <div class="score-display">SKOR: ${score}</div>
    <p style="font-size:7px; color:#444466">LEVEL TERCAPAI: ${level}</p>
    <button class="btn" onclick="startGame()">↺ MAIN LAGI</button>
  `;
  overlay.style.display = 'flex';
  gameLoop();
}

// Update pause button text saat state berubah
function updatePauseBtn() {
  const pb = document.getElementById('pause-btn');
  if (pb) pb.textContent = gameState === 'paused' ? '▶ LANJUT' : '⏸ PAUSE';
}

// Patch pauseGame & resumeGame buat update tombol
const _pause = pauseGame;
const _resume = resumeGame;
// already defined above, just call updatePauseBtn after state changes via togglePause

gameLoop();
</script>
</body>
</html>
